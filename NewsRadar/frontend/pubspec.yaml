name: newsradar
description: "NewsRadar - AI-powered news intelligence platform. Google Antigravity Hackathon."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  provider: ^6.1.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  url_launcher: ^6.3.1
  share_plus: ^10.0.3
  lottie: ^3.1.3
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  timeago: ^3.7.0
  shared_preferences: ^2.3.3
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
