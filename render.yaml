services:
  - type: web
    name: newsradar-backend
    runtime: python
    rootDir: NewsRadar/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    pythonVersion: "3.11.9"
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: DEBUG
        value: "false"
      - key: HOST
        value: "0.0.0.0"
      - key: ALLOWED_ORIGINS
        value: "*"
    plan: free
