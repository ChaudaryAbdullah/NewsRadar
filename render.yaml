services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: newsradar-backend
    runtime: python
    rootDir: NewsRadar/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # Set this in Render dashboard → Environment
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        value: "*"
    plan: free
